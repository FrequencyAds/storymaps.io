<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequency · Story Maps</title>
    <meta name="description" content="Browse the user story maps hosted on Frequency.">
    <link rel="canonical" href="https://storymaps.io/">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script>
    (function() {
        try {
            var s = localStorage.getItem('darkMode');
            var p = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (s !== null ? s === 'true' : p) document.documentElement.classList.add('dark-mode');
        } catch(e) {}
    })();
    </script>
    <link rel="stylesheet" href="/fonts.css">
    <link rel="stylesheet" href="/brand.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--brand-font-body);
            background: var(--brand-bg);
            color: var(--brand-text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
        }

        /* ── Header ── */
        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 28px;
            background: var(--brand-bg-nav);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--brand-border);
        }
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--brand-text);
        }
        .logo svg { width: 30px; height: 30px; color: var(--brand-blue); display: block; }
        .logo-text {
            font-family: var(--brand-font-heading);
            font-weight: 700;
            font-size: 20px;
            letter-spacing: -0.5px;
        }
        .header-actions { display: flex; align-items: center; gap: 10px; }
        .theme-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px; height: 38px;
            border: 1px solid var(--brand-border);
            border-radius: 8px;
            background: var(--brand-surface);
            color: var(--brand-text-secondary);
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }
        .theme-toggle:hover { color: var(--brand-text); border-color: var(--brand-border-strong); }
        .theme-toggle svg { width: 18px; height: 18px; }
        html.dark-mode .theme-toggle .icon-moon { display: none; }
        .theme-toggle .icon-sun { display: none; }
        html.dark-mode .theme-toggle .icon-sun { display: block; }
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: var(--grad-frequency-alive);
            color: #fff;
            font-family: var(--brand-font-heading);
            font-weight: 600;
            font-size: 14px;
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s, opacity 0.15s;
            box-shadow: 0 2px 8px rgba(118, 39, 240, 0.25);
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(118, 39, 240, 0.35); }
        .btn-primary svg { width: 16px; height: 16px; }

        /* ── Page ── */
        .wrap { max-width: 1200px; margin: 0 auto; padding: 40px 28px 80px; }
        .page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; margin-bottom: 28px; }
        .page-title { font-family: var(--brand-font-heading); font-size: 32px; font-weight: 700; letter-spacing: -1px; }
        .page-sub { color: var(--brand-text-secondary); font-size: 15px; margin-top: 4px; }
        .search {
            width: 280px; max-width: 100%;
            padding: 10px 14px;
            font: inherit; font-size: 14px;
            color: var(--brand-text);
            background: var(--brand-surface);
            border: 1px solid var(--brand-border);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .search::placeholder { color: var(--brand-text-muted); }
        .search:focus { border-color: var(--brand-blue); box-shadow: 0 0 0 3px rgba(22, 155, 222, 0.15); }

        /* ── Grid ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }
        .card {
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 132px;
            padding: 18px;
            background: var(--brand-surface);
            border: 1px solid var(--brand-border);
            border-radius: 12px;
            text-decoration: none;
            color: var(--brand-text);
            overflow: hidden;
            transition: transform 0.15s, box-shadow 0.2s, border-color 0.15s;
        }
        .card::before {
            content: '';
            position: absolute; left: 0; top: 0; bottom: 0;
            width: 4px;
            background: var(--grad-frequency-alive);
            opacity: 0.9;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 28px rgba(0,0,0,0.10);
            border-color: var(--brand-blue);
        }
        html.dark-mode .card:hover { box-shadow: 0 10px 28px rgba(0,0,0,0.45); }
        .card-name {
            font-family: var(--brand-font-heading);
            font-weight: 600;
            font-size: 17px;
            line-height: 1.3;
            margin-bottom: 6px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .card-name.untitled { color: var(--brand-text-muted); font-style: italic; font-weight: 500; }
        .card-id { font-family: 'SF Mono', 'Consolas', monospace; font-size: 12px; color: var(--brand-text-muted); }
        .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
        .card-tag {
            font-size: 11.5px; font-weight: 600; line-height: 1;
            padding: 4px 9px; border-radius: 999px;
            color: var(--brand-blue);
            background: color-mix(in srgb, var(--brand-blue) 12%, transparent);
            border: 1px solid color-mix(in srgb, var(--brand-blue) 28%, transparent);
            cursor: pointer; white-space: nowrap;
            transition: background 0.12s, color 0.12s;
        }
        .card-tag:hover { background: var(--brand-blue); color: #fff; }
        .card-meta { margin-top: auto; padding-top: 14px; font-size: 12.5px; color: var(--brand-text-secondary); }
        .active-tag-bar { display: none; align-items: center; gap: 10px; margin-bottom: 18px; font-size: 14px; color: var(--brand-text-secondary); }
        .active-tag-bar.visible { display: flex; }
        .active-tag-bar .clear-tag { background: none; border: none; color: var(--brand-blue); cursor: pointer; font: inherit; font-weight: 600; padding: 0; }
        .active-tag-bar .clear-tag:hover { text-decoration: underline; }

        /* ── States ── */
        .state { text-align: center; padding: 80px 20px; color: var(--brand-text-secondary); }
        .state-title { font-family: var(--brand-font-heading); font-size: 20px; color: var(--brand-text); margin-bottom: 8px; }
        .skeleton { background: var(--brand-surface); border: 1px solid var(--brand-border); border-radius: 12px; min-height: 132px; animation: pulse 1.3s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .footer { margin-top: 56px; padding-top: 24px; border-top: 1px solid var(--brand-border); color: var(--brand-text-muted); font-size: 13px; display: flex; gap: 18px; flex-wrap: wrap; }
        .footer a { color: var(--brand-text-secondary); text-decoration: none; }
        .footer a:hover { color: var(--brand-blue); }

        @media (max-width: 600px) {
            .header { padding: 12px 16px; }
            .wrap { padding: 28px 16px 60px; }
            .page-title { font-size: 26px; }
            .search { width: 100%; }
            .page-head { align-items: stretch; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="/" class="logo" aria-label="Frequency home">
            <!-- Frequency mark (@frequencyads/brand) -->
            <svg viewBox="0 0 72 71.9" fill="none" aria-hidden="true">
                <path fill="currentColor" d="M35.4,1.2C15.8,1.2,0,17,0,36.5s15.8,35.4,35.4,35.4c19.5,0,35.4-15.8,35.4-35.4S54.9,1.2,35.4,1.2z M47.3,43.7
                    c-1,8.7-2.9,5-3.9-0.1c-0.9-4.7-3.9-2.5-4.5,1.3c-1.4,8.4-2.4,11-3.5,11s-2.1-2.6-3.5-11c-0.6-3.8-3.2-5.9-4.5-1.3
                    c-1.1,4-2.2,4.8-3.4,0.1c-1.2-5-13-6-20.7-6.1c0.1,0,0.1,0,0.2,0c-0.1,0-0.2,0-0.2,0c7.7-0.1,19.5-1.1,20.7-6.1
                    c1.2-4.7,2.3-3.9,3.4,0.1c1.3,4.6,3.9,2.5,4.5-1.3c1.4-8.4,2.4-11,3.5-11s2.1,2.6,3.5,11c0.6,3.8,3.4,6,4.5,1.3
                    c1.2-5.2,1.8-8.6,3.9-0.1c1.2,5,12.5,6,20.2,6.1c-0.1,0-0.1,0-0.2,0c0.1,0,0.2,0,0.2,0C59.7,37.7,47.8,38.6,47.3,43.7z"/>
            </svg>
            <span class="logo-text">Frequency</span>
        </a>
        <div class="header-actions">
            <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </button>
            <a class="btn-primary" href="/new">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                New story map
            </a>
        </div>
    </header>

    <main class="wrap">
        <div class="page-head">
            <div>
                <h1 class="page-title">Story Maps</h1>
                <p class="page-sub" id="pageSub">Loading hosted maps…</p>
            </div>
            <input type="search" class="search" id="search" placeholder="Search maps or tags…" autocomplete="off" aria-label="Search maps">
        </div>
        <div class="active-tag-bar" id="activeTagBar"></div>
        <div class="grid" id="grid" aria-busy="true"></div>
        <div class="footer">
            <a href="https://github.com/jackgleeson/storymaps.io" target="_blank" rel="noopener">Open source (AGPL-3.0)</a>
            <a href="/privacy">Privacy</a>
            <a href="/terms">Terms</a>
        </div>
    </main>

    <script>
        var grid = document.getElementById('grid');
        var pageSub = document.getElementById('pageSub');
        var search = document.getElementById('search');
        var allMaps = [];

        // Theme toggle
        document.getElementById('themeToggle').addEventListener('click', function () {
            var on = document.documentElement.classList.toggle('dark-mode');
            try { localStorage.setItem('darkMode', String(on)); } catch (e) {}
        });

        function esc(s) {
            return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
            });
        }

        function relTime(iso) {
            if (!iso) return '';
            var then = new Date(iso).getTime();
            if (isNaN(then)) return '';
            var s = Math.max(0, (Date.now() - then) / 1000);
            if (s < 60) return 'just now';
            var m = s / 60; if (m < 60) return Math.floor(m) + 'm ago';
            var h = m / 60; if (h < 24) return Math.floor(h) + 'h ago';
            var d = h / 24; if (d < 30) return Math.floor(d) + 'd ago';
            var mo = d / 30; if (mo < 12) return Math.floor(mo) + 'mo ago';
            return Math.floor(mo / 12) + 'y ago';
        }

        function cardHTML(m) {
            var named = m.name && m.name.trim() && m.name.trim().toLowerCase() !== 'untitled';
            var name = named ? esc(m.name.trim()) : 'Untitled map';
            var tags = Array.isArray(m.tags) ? m.tags : [];
            var tagsHTML = tags.length
                ? '<div class="card-tags">' + tags.map(function (t) {
                    return '<span class="card-tag" role="button" tabindex="0" data-tag="' + esc(t) + '">' + esc(t) + '</span>';
                }).join('') + '</div>'
                : '';
            return '<a class="card" href="/' + encodeURIComponent(m.id) + '">' +
                '<div class="card-name' + (named ? '' : ' untitled') + '">' + name + '</div>' +
                '<div class="card-id">/' + esc(m.id) + '</div>' +
                tagsHTML +
                '<div class="card-meta">Updated ' + esc(relTime(m.updated_at)) + '</div>' +
                '</a>';
        }

        function renderList(list) {
            if (!list.length) {
                grid.style.display = 'block';
                grid.innerHTML = '<div class="state"><div class="state-title">' +
                    (allMaps.length ? 'No maps match your search' : 'No story maps yet') + '</div>' +
                    (allMaps.length ? '' : '<div>Create the first one with “New story map”.</div>') + '</div>';
                return;
            }
            grid.style.display = 'grid';
            grid.innerHTML = list.map(cardHTML).join('');
        }

        var activeTag = '';
        var activeTagBar = document.getElementById('activeTagBar');

        function updateTagBar() {
            if (activeTag) {
                activeTagBar.innerHTML = 'Filtered by tag <span class="card-tag" style="cursor:default">' + esc(activeTag) +
                    '</span> <button class="clear-tag" type="button">clear</button>';
                activeTagBar.classList.add('visible');
                activeTagBar.querySelector('.clear-tag').addEventListener('click', function () { setActiveTag(''); });
            } else {
                activeTagBar.classList.remove('visible');
                activeTagBar.innerHTML = '';
            }
        }

        function setActiveTag(tag) {
            activeTag = tag || '';
            updateTagBar();
            applyFilter();
        }

        function applyFilter() {
            var q = search.value.trim().toLowerCase();
            var list = allMaps;
            if (activeTag) {
                var at = activeTag.toLowerCase();
                list = list.filter(function (m) {
                    return (m.tags || []).some(function (t) { return String(t).toLowerCase() === at; });
                });
            }
            if (q) {
                list = list.filter(function (m) {
                    return (m.name || '').toLowerCase().indexOf(q) !== -1 ||
                        (m.id || '').toLowerCase().indexOf(q) !== -1 ||
                        (m.tags || []).some(function (t) { return String(t).toLowerCase().indexOf(q) !== -1; });
                });
            }
            renderList(list);
        }
        search.addEventListener('input', applyFilter);

        // Clicking a tag chip on a card filters by that tag (without following the card link).
        grid.addEventListener('click', function (e) {
            var chip = e.target.closest('.card-tag');
            if (chip && grid.contains(chip)) {
                e.preventDefault();
                e.stopPropagation();
                setActiveTag(chip.getAttribute('data-tag'));
            }
        });
        grid.addEventListener('keydown', function (e) {
            if ((e.key === 'Enter' || e.key === ' ') && e.target.classList && e.target.classList.contains('card-tag')) {
                e.preventDefault();
                setActiveTag(e.target.getAttribute('data-tag'));
            }
        });

        // Skeleton while loading
        grid.innerHTML = Array.from({ length: 8 }).map(function () { return '<div class="skeleton"></div>'; }).join('');

        fetch('/api/maps?limit=200', { headers: { 'Accept': 'application/json' } })
            .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
            .then(function (data) {
                allMaps = data.maps || [];
                grid.setAttribute('aria-busy', 'false');
                var n = data.total != null ? data.total : allMaps.length;
                pageSub.textContent = n + (n === 1 ? ' story map hosted on Frequency' : ' story maps hosted on Frequency');
                renderList(allMaps);
            })
            .catch(function () {
                grid.setAttribute('aria-busy', 'false');
                pageSub.textContent = '';
                grid.style.display = 'block';
                grid.innerHTML = '<div class="state"><div class="state-title">Couldn’t load maps</div><div>Please refresh to try again.</div></div>';
            });
    </script>
</body>
</html>
